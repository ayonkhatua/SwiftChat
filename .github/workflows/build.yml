name: Build Android APK

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    # 1. Java 17 Setup
    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'gradle'

    # 2. Flutter Setup
    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'
        cache: true

    # 3. Dependencies Download
    - name: Get Dependencies
      run: flutter pub get

    # 4. Build APK (Release Mode - Optimized for Premium UI)
    - name: Build APK
      run: flutter build apk --release

    # 5. Upload APK to GitHub Artifacts
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: SwiftChat-Premium-V2
        # Path ab ekdam sahi hai release folder ke liye
        path: build/app/outputs/flutter-apk/app-release.apk