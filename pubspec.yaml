name: dini_chat
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # 🟢 Firebase (Upgraded to match File Picker)
  firebase_core: ^3.4.0   # Upgrade zaroori hai
  firebase_auth: ^5.2.0
  cloud_firestore: ^5.3.0
  firebase_database: ^11.0.0
  firebase_storage: ^12.2.0
  firebase_messaging: ^15.1.0
  
  # Cloudinary
  cloudinary_public: ^0.23.1

  # Video Playback
  video_player: ^2.9.1
  chewie: ^1.8.5

  # UI & Utilities
  provider: ^6.1.1
  intl: ^0.19.0
  google_fonts: ^6.2.1
  image_picker: ^1.1.2
  cached_network_image: ^3.4.1
  
  # 🟢 Correct Version (Stable)
  flutter_local_notifications: ^17.2.2 
  
  http: ^1.2.2
  googleapis_auth: ^1.6.0
  qr_flutter: ^4.1.0
  url_launcher: ^6.3.0
  
  # 🟢 File Picker (Latest - compatible with new Firebase)
  file_picker: ^8.1.7

  # Audio & Permissions
  record: ^6.0.0
  audioplayers: ^6.1.0
  path_provider: ^2.1.4
  permission_handler: ^12.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/service-account.json
